apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: myapp-db
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15.4
  postgresql:
    parameters:
      max_connections: "100"
  bootstrap:
    initdb:
      database: myapp
      owner: myapp
      secret:
        name: myapp-db-secret
  storage:
    size: 1Gi
    storageClass: standard
